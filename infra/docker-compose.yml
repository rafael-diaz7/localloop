services:
  postgres:
    image: postgis/postgis:16-3.4
    container_name: localloop-postgres
    restart: unless-stopped
    environment:
      POSTGRES_DB: localloop
      POSTGRES_USER: localloop
      POSTGRES_PASSWORD: localloop
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./postgres/init:/docker-entrypoint-initdb.d:ro
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U localloop -d localloop"]
      interval: 10s
      timeout: 5s
      retries: 5

volumes:
  postgres_data:
